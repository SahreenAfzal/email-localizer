<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LingoFormat</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 500px;
      background: #111827;
      padding: 25px;
      border-radius: 12px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      background: #0b1220;
      border: 1px solid #334155;
      color: white;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>📧 LingoFormat</h1>

    <input type="file" id="htmlFile" accept=".html" />
    <input type="file" id="docxFile" accept=".docx" />

    <button id="generateBtn">Generate ZIP</button>

    <div id="status"></div>
  </div>

  <script src="script.js"></script>

</body>
</html>
